<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AuraStudy – Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>

  <!-- Navbar -->
  <nav class="auth-nav">
    <a href="#" class="nav-logo"><i class="bi bi-stars"></i> AuraStudy</a>
    <div class="nav-links">
      <a href="#">Features</a>
      <a href="#">Resources</a>
      <a href="#">Help</a>
    </div>
    <div></div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">

      <div class="login-icon-wrap">
        <i class="bi bi-shield-lock"></i>
      </div>

      <!-- Reset form -->
      <div id="resetView">
        <h1 class="auth-title">Set New Password</h1>
        <p class="auth-sub">Must be at least 8 characters.</p>

        <form id="resetForm" novalidate>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <div class="input-wrap">
              <i class="bi bi-lock"></i>
              <input type="password" id="newPassword" placeholder="••••••••" required/>
              <button type="button" class="toggle-pw" onclick="togglePassword('newPassword', this)">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <span class="field-error" id="newPasswordError"></span>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-wrap">
              <i class="bi bi-lock-fill"></i>
              <input type="password" id="confirmPassword" placeholder="••••••••" required/>
              <button type="button" class="toggle-pw" onclick="togglePassword('confirmPassword', this)">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <span class="field-error" id="confirmPasswordError"></span>
          </div>

          <button type="submit" class="btn-primary-auth" id="submitBtn">
            <span id="btnText">Reset Password</span>
            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
          </button>
        </form>
      </div>

      <!-- Success state -->
      <div id="successView" style="display:none; text-align:center;">
        <div class="success-icon-wrap">
          <i class="bi bi-check-circle"></i>
        </div>
        <h1 class="auth-title" style="font-size:1.4rem;">Password Reset!</h1>
        <p class="auth-sub">Your password has been updated successfully.</p>
        <a href="login.html" class="btn-primary-auth" style="text-decoration:none; margin-top:8px;">
          Back to Sign In
        </a>
      </div>

      <!-- Invalid/expired token state -->
      <div id="errorView" style="display:none; text-align:center;">
        <div class="login-icon-wrap" style="background:#fee2e2; color:#991b1b;">
          <i class="bi bi-exclamation-triangle"></i>
        </div>
        <h1 class="auth-title" style="font-size:1.4rem;">Link Expired</h1>
        <p class="auth-sub">This reset link is invalid or has expired.</p>
        <a href="forgot_password.html" class="btn-primary-auth" style="text-decoration:none; margin-top:8px;">
          Request New Link
        </a>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="auth.js"></script>
</body>
</html>
