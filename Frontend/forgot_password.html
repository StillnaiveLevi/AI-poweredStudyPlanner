<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AuraStudy – Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>

  <!-- Navbar -->
  <nav class="auth-nav">
    <a href="#" class="nav-logo"><i class="bi bi-stars"></i> AuraStudy</a>
    <div class="nav-links">
      <a href="#">Features</a>
      <a href="#">Resources</a>
      <a href="#">Help</a>
    </div>
    <div></div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">

      <div class="login-icon-wrap">
        <i class="bi bi-lock"></i>
      </div>

      <!-- Initial state: enter email -->
      <div id="requestView">
        <h1 class="auth-title">Forgot Password?</h1>
        <p class="auth-sub">Enter your email and we'll send you a reset link.</p>

        <form id="forgotForm" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrap">
              <i class="bi bi-envelope"></i>
              <input type="email" id="email" placeholder="name@example.com" required/>
            </div>
            <span class="field-error" id="emailError"></span>
          </div>

          <button type="submit" class="btn-primary-auth" id="submitBtn">
            <span id="btnText">Send Reset Link</span>
            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
          </button>
        </form>
      </div>

      <!-- Success state: email sent -->
      <div id="successView" style="display:none; text-align:center;">
        <div class="success-icon-wrap">
          <i class="bi bi-envelope-check"></i>
        </div>
        <h1 class="auth-title" style="font-size:1.4rem;">Check your inbox</h1>
        <p class="auth-sub" id="successMsg">
          We sent a password reset link to your email. It expires in 1 hour.
        </p>
        <p class="auth-sub" style="font-size:0.78rem; margin-top:8px;">
          Didn't receive it?
          <a href="#" id="resendLink" style="color:#1e3a8a; font-weight:600;">Resend</a>
        </p>
      </div>

      <p class="switch-auth"><a href="login.html"><i class="bi bi-arrow-left"></i> Back to Sign In</a></p>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="auth.js"></script>
</body>
</html>
