<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AuraStudy – Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Navbar  -->
  <nav class="auth-nav">
    <a href="#" class="nav-logo"><i class="bi bi-stars"></i> AuraStudy</a>
    <div class="nav-links">
      <a href="#">Features</a>
      <a href="#">Resources</a>
      <a href="#" style="color:#1e3a8a; font-weight:600;">Help</a>
    </div>
    <div></div><!-- spacer to keep logo left-aligned -->
  </nav>

  <!-- Main -->
  <main class="auth-main">
    <div class="auth-card">

      <!-- Icon -->
      <div class="login-icon-wrap">
        <i class="bi bi-stars"></i>
      </div>

      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-sub">Sign in to resume your focus journey.</p>

      <!-- Social buttons -->
      <div class="social-row">
        <button class="social-btn" id="googleBtn" type="button" onclick="handleGoogleSignIn()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18"/>
          Google
        </button>
        <button class="social-btn" id="appleBtn" type="button">
          <i class="bi bi-apple"></i> Apple
        </button>
      </div>

      <!-- Hidden Google One Tap target -->
      <div id="g_id_onload"
           data-client_id="386974513802-3fft4qo6qjpbmi5ejc5iqrudi27ft8q4.apps.googleusercontent.com"
           data-callback="handleGoogleCredential"
           data-auto_prompt="false">
      </div>

      <div class="divider"><span>OR EMAIL</span></div>

      <!-- Login form -->
      <form id="loginForm" novalidate>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="name@example.com" required/>
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label for="password" class="mb-0">Password</label>
            <a href="forgot_password.html" class="forgot-link">Forgot Password?</a>
          </div>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••" required/>
            <button type="button" class="toggle-pw" onclick="togglePassword('password', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <button type="submit" class="btn-primary-auth" id="submitBtn">
          <span id="btnText">Sign In</span>
          <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
        </button>

        <p class="switch-auth">Don't have an account? <a href="signup.html">Sign Up</a></p>

      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="auth.js"></script>
</body>
</html>
