<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AuraStudy – Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>
<div class="d-flex" id="app-wrapper">

  <!-- Sidebar -->
  <aside class="sidebar d-flex flex-column">
    <div class="sidebar-logo d-flex align-items-center gap-2">
      <div class="logo-icon"><i class="bi bi-stars"></i></div>
      <div>
        <div class="logo-title">AuraStudy</div>
        <div class="logo-sub">Cognitive Clarity</div>
      </div>
    </div>

    <nav class="sidebar-nav flex-grow-1 mt-3">
      <a href="dashboard.html" class="nav-item active"><i class="bi bi-grid"></i> Dashboard</a>
      <a href="subjects.html"  class="nav-item"><i class="bi bi-journal-bookmark-fill"></i> Subjects</a>
      <a href="tasks.html"     class="nav-item"><i class="bi bi-list-task"></i> Task List</a>
      <a href="#"              class="nav-item"><i class="bi bi-stopwatch"></i> Study Timer</a>
      <a href="#"              class="nav-item"><i class="bi bi-person"></i> Profile</a>
    </nav>

    <div class="sidebar-bottom">
      <button class="btn-start-session w-100 mb-3" id="startSessionBtn">
        <i class="bi bi-play-fill me-1"></i> Start Session
      </button>
      <a href="#" class="nav-item"><i class="bi bi-gear"></i> Settings</a>
      <a href="#" class="nav-item"><i class="bi bi-question-circle"></i> Help</a>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content flex-grow-1 d-flex flex-column">

    <!-- Top bar -->
    <div class="topbar d-flex align-items-center justify-content-between">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text" placeholder="Search resources..."/>
      </div>
      <div class="topbar-tabs">
        <a href="dashboard.html" class="tab-link active">Dashboard</a>
        <a href="subjects.html"  class="tab-link">Subjects</a>
        <a href="tasks.html"     class="tab-link">Tasks</a>
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="icon-btn"><i class="bi bi-bell"></i></button>
        <button class="icon-btn"><i class="bi bi-gear"></i></button>
        <img src="https://i.pravatar.cc/36" class="avatar" alt="avatar"/>
      </div>
    </div>

    <!-- Content -->
    <div class="dashboard-body">
      <div class="dashboard-left">

        <!-- AI Insight Banner -->
        <div class="ai-banner" id="aiBanner">
          <div class="ai-banner-labels">
            <span class="badge-ai">AI INSIGHT</span>
            <span class="badge-task">SUGGESTED NEXT TASK</span>
          </div>
          <h2 class="ai-banner-title" id="aiTitle">Loading suggestion…</h2>
          <p  class="ai-banner-reason" id="aiReason"></p>
          <div class="ai-banner-btns">
            <button class="btn-banner-primary" id="startNowBtn">Start Now</button>
            <button class="btn-banner-secondary">Reschedule</button>
          </div>
        </div>

        <!-- Study Schedule -->
        <div class="schedule-card">
          <div class="schedule-header d-flex align-items-center justify-content-between">
            <h3 class="schedule-title">Study Schedule</h3>
            <div class="d-flex align-items-center gap-2">
              <button class="icon-btn" id="prevWeekBtn"><i class="bi bi-chevron-left"></i></button>
              <span class="week-label" id="weekLabel"></span>
              <button class="icon-btn" id="nextWeekBtn"><i class="bi bi-chevron-right"></i></button>
            </div>
          </div>
          <div class="calendar-grid" id="calendarGrid">
            <!-- Injected by JS -->
          </div>
        </div>

      </div>

      <div class="dashboard-right">

        <!-- Weekly Focus -->
        <div class="focus-card">
          <h3 class="card-title">Weekly Focus</h3>
          <p class="card-sub" id="focusSub">Loading…</p>
          <div class="focus-pct" id="focusPct">–%</div>
          <div class="focus-trend" id="focusTrend"></div>
          <div class="progress mb-3">
            <div class="progress-bar focus-bar" id="focusBar" style="width:0%"></div>
          </div>
          <div class="focus-stats d-flex justify-content-around">
            <div class="stat-item">
              <div class="stat-val" id="statHours">–</div>
              <div class="stat-lbl">Hours</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
              <div class="stat-val" id="statStreak">–</div>
              <div class="stat-lbl">Streak</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
              <div class="stat-val" id="statFocus">Deep</div>
              <div class="stat-lbl">Focus</div>
            </div>
          </div>
        </div>

        <!-- High Priority -->
        <div class="priority-card">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="card-title mb-0">High Priority</h3>
            <a href="tasks.html" class="see-all-link">See All</a>
          </div>
          <div id="priorityList">
            <!-- Injected by JS -->
          </div>
        </div>

        <!-- Aura Tip -->
        <div class="tip-card">
          <div class="tip-label">AURA TIP</div>
          <p class="tip-text" id="tipText">Loading tip…</p>
        </div>

      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
