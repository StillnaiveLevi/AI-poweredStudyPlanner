<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AuraStudy – Create Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="auth-nav">
    <a href="#" class="nav-logo"><i class="bi bi-stars"></i> AuraStudy</a>
    <div class="nav-links">
      <a href="#">Features</a>
      <a href="#">Pricing</a>
      <a href="#">Resources</a>
      <a href="#">Help</a>
    </div>
    <a href="login.html" class="nav-login">Log In</a>
  </nav>

  <!-- Main  -->
  <main class="auth-main">
    <div class="auth-card">

      <h1 class="auth-title">Start Your Focused<br/>Journey</h1>
      <p class="auth-sub">Create your digital sanctuary for deep learning.</p>

      <!-- Social buttons -->
      <div class="social-row">
        <button class="social-btn" id="googleBtn" type="button" onclick="handleGoogleSignIn()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18"/>
          Google
        </button>
        <button class="social-btn" id="appleBtn" type="button">
          <i class="bi bi-apple"></i> Apple
        </button>
      </div>

      <!-- Hidden Google One Tap target -->
      <div id="g_id_onload"
           data-client_id="386974513802-3fft4qo6qjpbmi5ejc5iqrudi27ft8q4.apps.googleusercontent.com"
           data-callback="handleGoogleCredential"
           data-auto_prompt="false">
      </div>

      <div class="divider"><span>OR</span></div>

      <!-- Signup form -->
      <form id="signupForm" novalidate>

        <div class="form-group">
          <label for="fullName">Full Name</label>
          <div class="input-wrap">
            <i class="bi bi-person"></i>
            <input type="text" id="fullName" placeholder="Alex Rivera" required/>
          </div>
          <span class="field-error" id="nameError"></span>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <i class="bi bi-envelope"></i>
            <input type="email" id="email" placeholder="alex@aurastudy.com" required/>
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="bi bi-lock"></i>
            <input type="password" id="password" placeholder="••••••••" required/>
            <button type="button" class="toggle-pw" onclick="togglePassword('password', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="terms-row">
          <input type="checkbox" id="terms" required/>
          <label for="terms">
            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
          </label>
        </div>
        <span class="field-error" id="termsError"></span>

        <button type="submit" class="btn-primary-auth" id="submitBtn">
          <span id="btnText">Create Account</span>
          <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
        </button>

        <p class="switch-auth">Already have an account? <a href="login.html">Log In</a></p>

      </form>
    </div>
  </main>

  <!-- Footer badges -->
  <footer class="auth-footer">
    <div class="footer-badge">
      <i class="bi bi-lightning-charge"></i>
      <span>Smart Flow</span>
    </div>
    <div class="footer-badge">
      <i class="bi bi-shield-check"></i>
      <span>Secure Data</span>
    </div>
    <div class="footer-badge">
      <i class="bi bi-graph-up"></i>
      <span>Growth Tips</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="auth.js"></script>
</body>
</html>
